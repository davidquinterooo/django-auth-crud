{% extends "base.html" %}

{% block content %}

<main class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <h1 class="text-center py-2 fs-1">Tareas</h1>
            <ul class="list-group card border-info mb-3">
                {% for task in tasks %}
                    <a class="list-group-item" href="{% url 'task_detail' task.id %}">
                        <header class="d-flex justify-content-between">
                            {% if task.important %}
                            <h2 class="fw-bold fs-4">{{ task.title }}</h2>
                            {% else %}
                            <h2 class="fw-bold fs-4">{{ task.title }}</h2>
                            {% endif %}
                            <p>{{ task.user.username }} </p>
                        </header>
                        <p>{{ task.description }}</p>
                    </a>
                {% endfor %}
            </ul>
        </div>
    </div>
</main>

{% endblock %}
