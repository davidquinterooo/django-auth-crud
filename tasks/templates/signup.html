{% extends "base.html" %}

{% block content %}

<main class="container-fluid px-0 offset-md-4">
    <div class="row">
        <div class="col-md-4">
            <form action="/signup/" method="POST"
            class="card card-body mt-4 card border-info mb-3">
                <h1 class="text-center display-7">Registrar cuenta</h1>
                {{ error }}
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username">
                        Nombre de usuario:
                    </label>
                    <input class="form-control mb-3" 
                    type="text"
                    name="username"
                    id="username"
                    placeholder="Ingrese un nombre de usuario...">

                    <label for="password1">
                        Contraseña:
                    </label>
                    <input class="form-control mb-3" 
                    type="password"
                    name="password1"
                    id="password1"
                    placeholder="Ingrese una contraseña...">

                    <label for="password2">
                        Confirmar contraseña:
                    </label>
                    <input class="form-control mb-1" 
                    type="password"
                    name="password2"
                    id="password2"
                    placeholder="Confirma tu contraseña...">
                </div>

                <button class="btn btn-primary">
                    Registrar
                </button>
            </form>              
        </div>
    </div>
</main>


{% endblock %}
