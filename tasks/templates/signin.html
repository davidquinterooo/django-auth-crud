{% extends "base.html" %}

{% block content %}

<main class="container-fluid px-0 offset-md-4">
    <div class="row">
        <div class="col-md-4">
            <form action="/signin/" method="POST"
            class="card card-body mt-4 card border-info mb-3">
                <h1 class="text-center display-7">Iniciar sesión</h1>
                {{ error }}
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username">
                        Nombre de usuario:
                    </label>
                    <input class="form-control mb-3" 
                    type="text"
                    name="username"
                    id="username"
                    placeholder="Ingrese nombre de usuario...">

                    <label for="password">
                        Contraseña:
                    </label>
                    <input class="form-control mb-1" 
                    type="password"
                    name="password"
                    id="password"
                    placeholder="Ingrese contraseña...">
                </div>

                <button class="btn btn-primary">
                    Iniciar sesión
                </button>
            </form>             
        </div>
    </div>
</main>

<main class="container">



</main>

{% endblock %}
