{% extends "base.html" %}
{% block content %}
<main class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <form class="card card-body mt-4 mb-4 border-info" action="/tasks/create/" method="POST">
                <h1 class="text-center fs-2">Crear tarea</h1>
                {% csrf_token %}
                {{error}}
                {{ form.as_p }}
                <button class="btn btn-primary">
                    Guardar
                </button>
            </form>
        </div>
    </div>
</main>
{% endblock %}
